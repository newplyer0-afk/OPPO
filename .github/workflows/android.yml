name: Build and Sign TimeFlow App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode Keystore
        run: |
          echo "${{ secrets.MYKEYSTORE }}" | base64 --decode > my-release-key.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTOREPASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEYSTOREPASSWORD }} 
          # یہاں ہم نے KEYSTOREPASSWORD کو ہی Key Password کے طور پر استعمال کیا ہے کیونکہ آپ کے دونوں پاسورڈ سیم ہیں۔

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: TimeFlow-Release
          path: app/build/outputs/apk/release/app-release.apk


