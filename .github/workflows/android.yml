name: Build and Sign TimeFlow App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: OPPO/OPPO  # یہ سب سے اہم تبدیلی ہے، یہاں اپنے پروجیکٹ کا صحیح پاتھ لکھیں

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode Keystore
        run: |
          echo "${{ secrets.MYKEYSTORE }}" | base64 --decode > my-release-key.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTOREPASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEYSTOREPASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TimeFlow-Release
          path: OPPO/OPPO/app/build/outputs/apk/release/app-release.apk


