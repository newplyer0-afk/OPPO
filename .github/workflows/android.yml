name: Android CI Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build Premium APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.3.1'

      - name: Adjust Executable Permissions
        run: chmod +x gradlew

      # यहाँ हम सीक्रेट को फाइल में बदल रहे हैं
      - name: Decode Keystore
        run: |
          echo "${{ secrets.MY_KEYSTORE_BASE64 }}" | base64 --decode > my-release-key.jks

      # यहाँ हम release build के लिए कमांड चला रहे हैं
      - name: Build Signed Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed APK Build Output
        uses: actions/upload-artifact@v4
        with:
          name: Premium_Release_APK
          path: app/build/outputs/apk/release/app-release.apk


