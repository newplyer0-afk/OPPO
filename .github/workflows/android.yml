name: Android CI Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build Premium APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Inject Dynamic Gradle Wrapper Setup
        run: |
          # Since gradlew wrapper may not be pushed initially, bootstrap standard gradle and generate wrapper setup
          sudo apt-get update
          sudo apt-get install -y gradle
          gradle wrapper --gradle-version 9.3.1

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.3.1'

      - name: Adjust Executable Permissions
        run: chmod +x gradlew

      - name: Clean Build Workspace
        run: ./gradlew clean

      - name: Generate Custom Keystore
        run: keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Compile Premium Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Signed APK Build Output
        uses: actions/upload-artifact@v4
        with:
          name: VHGPL_Timetable_Tracker_Debug_APK
          path: app/build/outputs/apk/debug/app-debug.apk
          
